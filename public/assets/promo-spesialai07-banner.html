<!DOCTYPE html>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080f0e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Manrope', sans-serif; }
    .card { width: 540px; height: 540px; background: linear-gradient(135deg, #0e201b 0%, #050e0c 100%); position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #10b981; }
    .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(16,185,129,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.03) 1px,transparent 1px); background-size: 30px 30px; }
    .glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(16,185,129,.15) 0%, transparent 70%); top: -50px; left: -50px; }
    .content { position: relative; z-index: 2; text-align: center; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    
    /* Real DigiePro Logo */
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .brand-symbol { position: relative; width: 36px; height: 36px; background: #17211f; border-radius: 7px; display: block; overflow: hidden; transform: rotate(-4deg); }
    .brand-symbol i, .brand-symbol b { position: absolute; border: 4px solid white; border-left: 0; }
    .brand-symbol i { width: 16px; height: 22px; left: 7px; top: 7px; border-radius: 0 12px 12px 0; }
    .brand-symbol b { width: 11px; height: 15px; left: 18px; top: 11px; border-color: #f5755c; border-radius: 0 9px 9px 0; }
    .brand-word { font-size: 22px; }
    .brand-word span { color: #10b981; }

    .label { color: #8cc8bc; font-size: 14px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
    .big-discount { font-size: 90px; font-weight: 900; line-height: 0.9; color: #10b981; text-shadow: 0 0 60px rgba(16,185,129,.4); letter-spacing: -3px; }
    .desc { color: #9cb5b0; font-size: 15px; font-weight: 600; line-height: 1.5; max-width: 380px; }
    .desc strong { color: #fff; }
    .syarat { display: flex; align-items: center; gap: 8px; background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25); padding: 9px 18px; border-radius: 6px; color: #fff; font-size: 11px; font-weight: 600; }
    .code-row { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
    .code-label { color: #7fa89e; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .code { font-size: 26px; font-weight: 900; letter-spacing: 3px; color: #fff; font-family: monospace; background: rgba(0,0,0,.5); border: 1.5px dashed #10b981; padding: 8px 24px; border-radius: 8px; }
    .footer { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; z-index: 2; color: rgba(160,200,190,.5); font-size: 10px; font-weight: 600; letter-spacing: 1px; }
    .footer b { color: #10b981; }
  </style>
</head>

    <div class="footer">digiepro.store &nbsp;·&nbsp; Stok terbatas — <b>Klaim sekarang</b></div>

</body>
</html>
