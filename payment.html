<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="icon" href="assets/favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
  *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;color:#253247;background:#f7f9fc}.pay-layout{min-height:100vh;display:grid;grid-template-columns:minmax(0,2fr) minmax(330px,1fr)}.pay-main{background:#fff;padding:42px max(28px,calc((100vw - 1120px)/2));position:relative}.pay-brand{display:flex;align-items:center;gap:10px;color:#10234a}.pay-brand img{width:40px;height:40px;object-fit:contain}.pay-brand b{font-size:19px}.pay-brand span{color:#2576ef}.back{position:absolute;right:36px;top:42px;color:#536174;text-decoration:none;font-size:13px}.deadline{text-align:center;margin:58px 0 8px;font-size:14px;font-weight:600;color:#17233a}.amount{text-align:center;font-size:42px;font-weight:400;letter-spacing:-1px;margin:0 0 38px}.method-title{font-size:14px;font-weight:700;margin-bottom:14px}.method{border:1px solid #dce2ea;border-radius:8px;overflow:hidden}.method-head{height:58px;padding:0 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e5e9ef;font-weight:600}.method-head span:last-child{margin-left:auto}.fraud{margin:26px auto 30px;max-width:500px;padding:18px;border:2px solid #3a69f7;border-radius:6px;background:#eef2ff;display:grid;gap:7px;font-size:13px;line-height:1.5}.qr-intro{text-align:center;font-size:13px}.qr-card{width:258px;margin:18px auto 30px;padding:18px;border-radius:8px;background:#fff;box-shadow:0 8px 25px rgba(34,48,69,.14);text-align:center}.qris-word{font-size:26px;font-weight:900;letter-spacing:-3px;color:#050505;margin-bottom:12px}.qr-card #qr{display:grid;place-items:center}.qr-card small{display:block;margin-top:12px;color:#4e5661}.powered{width:max-content;margin:44px auto 0;padding:8px 12px;border:1px solid #ccd3dc;border-radius:4px;font-size:9px;color:#5f6a78}.summary{padding:46px 34px;background:#f8f9fb;border-left:1px solid #edf0f4}.summary h1{margin:0 0 8px;font-size:25px}.summary>p{font-size:13px;color:#596474;margin-bottom:32px}.summary-row{padding:20px 0;border-bottom:1px solid #e2e6ec;display:grid;gap:8px}.summary-row span{font-size:13px;color:#596474}.summary-row b{font-size:13px;line-height:1.6}.total{display:flex;justify-content:space-between;margin:30px 0;font-size:15px}.confirm{width:100%;height:48px;border:0;border-radius:8px;background:#2075f2;color:#fff;font-weight:800;cursor:pointer}.confirm:disabled{opacity:.55}.notice{display:none;margin-top:14px;padding:12px;border-radius:8px;background:#eef5ff;color:#1857aa;font-size:12px;line-height:1.5}.notice.show{display:block}.error{max-width:520px;margin:120px auto;padding:30px;background:#fff;border:1px solid #e1e6ee;border-radius:12px;text-align:center}.error a{color:#1769f4}@media(max-width:820px){.pay-layout{grid-template-columns:1fr}.pay-main{padding:24px 18px}.summary{border-left:0;border-top:1px solid #e3e7ed;padding:28px 20px}.back{right:18px;top:34px}.deadline{margin-top:48px}.amount{font-size:34px}.qr-card{width:min(258px,100%)}}
  .qris-word{height:36px!important;font-size:0!important;margin:0 auto 12px!important;background:url('assets/payments/qris.svg') center/92px auto no-repeat}.deadline-countdown{display:block;margin-top:8px;color:#1769f4;font-size:18px;font-variant-numeric:tabular-nums}.confirm.waiting{background:#ed9d18}.confirm.success{background:#17a566}.notice.error{background:#fff1f1;color:#bd2c2c}
  </style>

<body><div id="app"></div>
<script src="assets/vendor/qrcode.min.js?v=2"></script><script src="qris.js?v=16"></script>
<script>
const STATIC_QRIS='00020101021126570011ID.DANA.WWW011893600915303270621302090327062130303UMI51440014ID.CO.QRIS.WWW0215ID10265345984810303UMI5204481453033605802ID5914Webtokoku plus6014Kota Palembang61053026663040D38';
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); const money=v=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(Number(v||0));
const saved=JSON.parse(sessionStorage.getItem('jagoprem_payment')||'null'); const app=document.querySelector('#app');
if(!saved?.order){app.innerHTML='<div class="error"><h1>Data pembayaran tidak ditemukan</h1><p>Buka kembali pesanan dari akun JagoPrem.</p><a href="/">Kembali ke toko</a></div>';}else{const {order,customer}=saved;const deadline=new Date(order.expiresAt||Date.now()+1800000);const items=(order.items||[]).map(x=>`${esc(x.title||x.id)} × ${Number(x.quantity||1)}`).join('<br>');app.innerHTML=`<main class="pay-layout"><section class="pay-main"><header class="pay-brand"><img src="assets/jagoprem-mark.png" alt=""><b>Jago<span>Prem</span></b></header><a class="back" href="/">Kembali ke toko</a><p class="deadline">BAYAR SEBELUM ${deadline.toLocaleString('id-ID',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}).toUpperCase()}</p><h1 class="amount">${money(order.total)}</h1><div class="method-title">METODE PEMBAYARAN</div><article class="method"><div class="method-head"><span>▦</span><b>Pembayaran QRIS</b><span>⌃</span></div><div class="fraud"><b>Lindungi Diri dari Penipuan</b><span>Pastikan nama merchant, nominal, dan detail pesanan sudah benar sebelum melakukan pembayaran.</span></div><p class="qr-intro">Kami menerima QRIS dari seluruh bank dan e-wallet yang mendukung QRIS</p><div class="qr-card"><div class="qris-word">QRIS</div><div id="qr"></div><small>NMID: ID1026534598481</small></div></article><div class="powered">POWERED BY JAGOPREM</div></section><aside class="summary"><h1>Ringkasan Pesanan</h1><p>Invoice #: ${esc(order.id)}</p><div class="summary-row"><span>Deskripsi</span><b>${items}</b></div><div class="summary-row"><span>Batas pembayaran</span><b>${deadline.toLocaleString('id-ID')}</b></div><div class="total"><span>Total Tagihan</span><b>${money(order.total)}</b></div><button class="confirm" id="confirm">Saya sudah membayar</button><div class="notice" id="notice"></div><p style="font-size:11px;color:#748092;line-height:1.6">Setelah diverifikasi, detail produk dikirim ke WhatsApp ${esc(customer?.whatsapp||'')}.</p></aside></main>`;new QRCode(document.querySelector('#qr'),{text:QrisTools.dynamic(STATIC_QRIS,Number(order.total)),width:218,height:218,correctLevel:QRCode.CorrectLevel.M});document.querySelector('#confirm').onclick=async e=>{e.currentTarget.disabled=true;e.currentTarget.textContent='Memeriksa pembayaran...';const n=document.querySelector('#notice');try{const r=await fetch(`/api/orders/${encodeURIComponent(order.id)}/confirm`,{method:'POST',headers:{'Content-Type':'application/json','X-JagoPrem-Request':'1'},body:'{}'});const data=await r.json();if(!r.ok)throw new Error(data.error||'Konfirmasi gagal.');n.textContent=data.message||'Pembayaran masuk antrean verifikasi tim JagoPrem.';n.classList.add('show');e.currentTarget.textContent='Konfirmasi terkirim';}catch(err){n.textContent=err.message;n.classList.add('show');e.currentTarget.disabled=false;e.currentTarget.textContent='Coba konfirmasi lagi';}};}
</script><script src="payment-runtime.js?v=1"></script></body></html>
